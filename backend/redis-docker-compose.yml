version: '3.8'

services:

  redis:
    image: redis:7-alpine
    container_name: orivia_redis
    ports:
      - "6379:6379"
    volumes:
      - orivia_redis_data:/data

  redis-insight:
    image: redis/redisinsight:latest
    container_name: orivia_redis_insight
    ports:
      - "5540:5540"
    depends_on:
      - redis

volumes:
  orivia_redis_data: